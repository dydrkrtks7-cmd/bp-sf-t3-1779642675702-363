<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="85" cy="524" r="53" fill="#334155" opacity="0.13"/>
    <circle cx="948" cy="650" r="54" fill="#334155" opacity="0.09"/>
    <circle cx="-8" cy="114" r="91" fill="#334155" opacity="0.16"/>
    <circle cx="760" cy="46" r="54" fill="#334155" opacity="0.13"/>
    <circle cx="836" cy="290" r="82" fill="#334155" opacity="0.13"/>
    <circle cx="827" cy="346" r="53" fill="#334155" opacity="0.16"/>
    <rect x="-100" y="304" width="25" height="46" rx="8" fill="#0f172a" opacity="0.13" transform="rotate(43, 446, 535)"/>
    <rect x="1134" y="709" width="61" height="80" rx="8" fill="#0f172a" opacity="0.10" transform="rotate(5, 88, 605)"/>
    <rect x="1070" y="-97" width="50" height="32" rx="8" fill="#0f172a" opacity="0.10" transform="rotate(25, 482, 691)"/>
    <rect x="1229" y="449" width="76" height="69" rx="8" fill="#0f172a" opacity="0.05" transform="rotate(38, -57, -68)"/>
    <rect x="-11" y="-32" width="53" height="36" rx="8" fill="#0f172a" opacity="0.11" transform="rotate(21, 236, -30)"/>
    <rect x="328" y="527" width="40" height="23" rx="8" fill="#0f172a" opacity="0.04" transform="rotate(29, -60, 434)"/>
    <rect x="1133" y="363" width="74" height="84" rx="8" fill="#0f172a" opacity="0.13" transform="rotate(23, 941, 379)"/>
    <rect x="292" y="10" width="41" height="22" rx="8" fill="#0f172a" opacity="0.04" transform="rotate(31, 747, 630)"/>
    <polygon points="588,210 659,352 517,352" fill="#334155" opacity="0.12"/>
    <polygon points="706,-78 804,118 608,118" fill="#334155" opacity="0.11"/>
    <polygon points="48,-16 135,158 -39,158" fill="#334155" opacity="0.09"/>
    <polygon points="243,668 287,756 199,756" fill="#334155" opacity="0.07"/>

  <!-- Wave at bottom -->
  <path d="M0,532 C360,581 840,483 1200,532 L1200,630 L0,630Z" fill="#334155" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    SEO 오토파일럿 가격
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#6366f1" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 SEO 오토파일럿 가격 — 서버 웜업
  </text>
</svg>